name: Daily STA Digest

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas

      - name: Run daily digest
        run: python scripts/daily_digest.py

      - name: Commit refreshed dashboard.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.db
          if ! git diff --cached --quiet; then
            git commit -m "Daily auto-sync $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No DB changes to commit."
          fi
