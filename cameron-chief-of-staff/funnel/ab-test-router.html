<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shannon Nicole</title>
<style>
  body { margin: 0; background: #0B1426; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .loading { color: #FFD700; font-family: sans-serif; font-size: 1rem; }
</style>
</head>
<body>
<div class="loading">Loading...</div>
<script>
  // ─── A/B TEST ROUTER ───────────────────────────────────────────────────────
  // Splits visitors 50/50 between Version A (Patriot) and Version B (Feminine)
  // Remembers which version each visitor was assigned (stays consistent on return)
  // Tracks which version is shown in localStorage for analytics reporting

  const VERSION_A = 'https://skubin53.github.io/sta-dashboard/cameron-chief-of-staff/funnel/website-v2-black-gold.html';
  const VERSION_B = 'https://skubin53.github.io/sta-dashboard/cameron-chief-of-staff/funnel/website-version-a-patriot.html';

  function getOrAssignVariant() {
    let variant = localStorage.getItem('sta_ab_variant');
    if (!variant) {
      variant = Math.random() < 0.5 ? 'A' : 'B';
      localStorage.setItem('sta_ab_variant', variant);
      localStorage.setItem('sta_ab_assigned', new Date().toISOString());
    }
    return variant;
  }

  function trackVariant(variant) {
    // Fire to quiz server for analytics logging
    fetch('https://introduces-christ-lookup-sculpture.trycloudflare.com/ab-track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        variant,
        url: window.location.href,
        referrer: document.referrer,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
      })
    }).catch(() => {}); // silent fail — never block the redirect
  }

  const variant = getOrAssignVariant();
  trackVariant(variant);

  // Redirect to assigned version
  if (variant === 'A') {
    window.location.replace(VERSION_A);
  } else {
    window.location.replace(VERSION_B);
  }
</script>
</body>
</html>
